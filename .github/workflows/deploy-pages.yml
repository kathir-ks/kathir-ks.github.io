name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'assets/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          # Publish only the root-level index.html (and any sibling static files).
          # Workers/ and other dirs are excluded — they're not served by Pages.
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
