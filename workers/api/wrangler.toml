name = "kathir-os-api"
main = "index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[r2_buckets]]
binding = "R2"
bucket_name = "kathir-os"

[vars]
GH_USERNAME = "kathir-ks"
HF_USERNAME = "KathirKs"
# HF_DATASETS = "fineweb-edu-hindi"
# HF_MODELS   = "Gemma-200M-hindi"
LLM_PROVIDER = "gemini"
# GEMINI_MODEL = "gemini-2.0-flash"
# DAILY_ASK_LIMIT = "800"
# OPENAI_BASE_URL = "https://api.groq.com/openai/v1"
# OPENAI_MODEL    = "llama-3.3-70b-versatile"
# ANTHROPIC_MODEL = "claude-haiku-4-5-20251001"

# Secrets — set via `wrangler secret put`:
#   GEMINI_KEY      (when LLM_PROVIDER=gemini)
#   OPENAI_KEY      (when LLM_PROVIDER=openai; covers Groq/OpenRouter/vLLM)
#   ANTHROPIC_KEY   (when LLM_PROVIDER=anthropic)
#   GITHUB_TOKEN    (PAT, public repos read-only is enough)
#   ADMIN_TOKEN     (random string; gates POST /refresh)

# After deploying, optionally add a custom domain:
# [[routes]]
# pattern = "api.kathir-ks.dev/*"
# zone_name = "kathir-ks.dev"
